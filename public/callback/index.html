<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting Strava…</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .card {
      padding: 2rem;
      max-width: 320px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #334155;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.125rem; margin: 0 0 0.5rem; }
    p { font-size: 0.875rem; color: #94a3b8; margin: 0; }
    .error { color: #f87171; }
    .success { color: #4ade80; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Connecting to Strava…</h1>
    <p id="message">Exchanging authorization code for tokens</p>
  </div>
  <script>
    const CLIENT_ID = '204869';
    const TOKEN_URL = 'https://www.strava.com/oauth/token';
    const APP_URL = '/TigerClaw2026Training/';
    const STORAGE_KEY = 'tc50k_client_secret';
    const TOKEN_STORAGE_KEY = 'tc50k_strava_tokens';

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      const titleEl = document.getElementById('title');
      const msgEl = document.getElementById('message');
      const spinnerEl = document.getElementById('spinner');

      if (error || !code) {
        spinnerEl.style.display = 'none';
        titleEl.textContent = 'Authorization failed';
        titleEl.className = 'error';
        msgEl.textContent = error === 'access_denied'
          ? 'You denied access. Go back and try again.'
          : `Error: ${error || 'No code received'}`;
        setTimeout(() => window.location.replace(APP_URL), 3000);
        return;
      }

      const clientSecret = localStorage.getItem(STORAGE_KEY) || '';
      if (!clientSecret) {
        spinnerEl.style.display = 'none';
        titleEl.textContent = 'Missing client secret';
        titleEl.className = 'error';
        msgEl.textContent = 'Please save your Strava client secret in Settings first.';
        setTimeout(() => window.location.replace(APP_URL), 3000);
        return;
      }

      try {
        const resp = await fetch(TOKEN_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            client_id: CLIENT_ID,
            client_secret: clientSecret,
            code: code,
            grant_type: 'authorization_code',
          }),
        });

        if (!resp.ok) {
          throw new Error(`Token exchange failed: ${resp.status} ${await resp.text()}`);
        }

        const data = await resp.json();
        const tokens = {
          accessToken: data.access_token,
          refreshToken: data.refresh_token,
          expiresAt: data.expires_at,
          scope: data.scope,
        };

        localStorage.setItem(TOKEN_STORAGE_KEY, JSON.stringify(tokens));

        spinnerEl.style.display = 'none';
        titleEl.textContent = 'Connected!';
        titleEl.className = 'success';
        msgEl.textContent = 'Strava connected successfully. Redirecting…';

        setTimeout(() => window.location.replace(APP_URL), 1200);
      } catch (err) {
        spinnerEl.style.display = 'none';
        titleEl.textContent = 'Connection failed';
        titleEl.className = 'error';
        msgEl.textContent = err.message || 'Unknown error. Check console.';
        console.error('Strava token exchange error:', err);
        setTimeout(() => window.location.replace(APP_URL), 4000);
      }
    }

    handleCallback();
  </script>
</body>
</html>
